{% extends "base.html" %}

{% block title %}Log In | Maker{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div style="text-align: center; margin-bottom: 24px;">
        <div style="background: var(--primary); padding: 12px; border-radius: 8px; color: white; display: inline-block; font-size: 24px; font-weight: 900; line-height: 1;">M</div>
        <span style="color: #282828; font-weight: 800; font-size: 24px; margin-left: 8px;">aker</span>
    </div>
    <h2 style="font-size: 20px; font-weight: 700; color: #282828;">Welcome back</h2>
    <p style="font-size: 14px; margin-bottom: 24px; color: var(--text-muted);">Log in to your Maker account.</p>
    <form method="POST" class="auth-form">
      <div class="field">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="e.g. john@example.com" />
      </div>

      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" />
      </div>

      <button class="solid-btn" type="submit">Log in</button>
    </form>
    <p class="auth-alt">Don't have an account? <a href="/signup">Sign up</a></p>
  </div>
</section>
{% endblock %}
